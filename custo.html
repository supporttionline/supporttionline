<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupportTI - Custos de  Mercadoria</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#0d6efd;
color:white;
padding:20px;
font-size:22px;
font-weight:600;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:600;
font-size:14px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin-top:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.btn-add{background:#198754;color:white}
.btn-export{background:#0d6efd;color:white}
.btn-remove{background:#dc3545;color:white}

button:hover{opacity:0.9}


table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#f1f3f7;
}

.result{color:#0d6efd;font-weight:600}
.lucro{color:#198754;font-weight:600}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.box{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 5px 10px rgba(0,0,0,0.06);
text-align:center;
}

.box h3{margin:5px 0}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
.dashboard{grid-template-columns:1fr 1fr}
}

</style>
</head>

<body>

<header>
SupportTI • Cálculo de Custos
</header>

<div class="container">

<div class="dashboard">

<div class="box">
Total Produtos
<h3 id="totalProdutos">0</h3>
</div>

<div class="box">
Custo Total
<h3 id="custoTotal">R$0</h3>
</div>

<div class="box">
Venda Total
<h3 id="vendaTotal">R$0</h3>
</div>

<div class="box">
Lucro Total
<h3 id="lucroTotal">R$0</h3>
</div>

</div>

<div class="card grid">

<div>
<label>Frete / custo adicional (R$)</label>
<input type="number" id="frete" value="0" oninput="calcular()">
</div>

<div>
<label>Taxa NF + cartão (%)</label>
<input type="number" id="taxa" value="8.91" step="0.01" oninput="calcular()">
</div>

</div>

<div class="card">

<button class="btn-add" onclick="addProduto()">Adicionar Produto</button>
<button class="btn-export" onclick="exportExcel()">Exportar Excel</button>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Qtd</th>
<th>Total Peças</th>
<th>Venda</th>
<th>Imposto</th>
<th>Custo Final</th>
<th>Lucro</th>
<th>Margem</th>
<th>Remover</th>
</tr>
</thead>

<tbody id="produtos"></tbody>

</table>

</div>

</div>

<script>

let id=0

function addProduto(){

let tabela=document.getElementById('produtos')

let tr=document.createElement('tr')

tr.innerHTML=`

<td><input></td>
<td><input type="number" id="q${id}" value="0" oninput="calcular()"></td>
<td><input type="number" id="t${id}" value="0" oninput="calcular()"></td>
<td><input type="number" id="v${id}" value="0" oninput="calcular()"></td>
<td class="result" id="i${id}">-</td>
<td class="result" id="c${id}">-</td>
<td class="lucro" id="l${id}">-</td>
<td id="m${id}">-</td>
<td><button class="btn-remove" onclick="remover(this)">X</button></td>

`

tabela.appendChild(tr)

id++

calcular()

}

function remover(btn){
btn.parentNode.parentNode.remove()
calcular()
}

function calcular(){

let frete=parseFloat(document.getElementById('frete').value)||0
let taxa=(parseFloat(document.getElementById('taxa').value)||0)/100

let totalCompra=0
let vendaTotal=0
let lucroTotal=0
let count=0

let dados=[]

for(let i=0;i<id;i++){

let q=document.getElementById('q'+i)
let t=document.getElementById('t'+i)
let v=document.getElementById('v'+i)

if(!q)continue

let qtd=parseFloat(q.value)||0
let total=parseFloat(t.value)||0
let venda=parseFloat(v.value)||0

count++

dados.push({i,qtd,total,venda})

totalCompra+=total

}

for(let p of dados){

let unit=p.qtd>0?p.total/p.qtd:0

let freteProduto=totalCompra>0?(p.total/totalCompra)*frete:0

let freteUnit=p.qtd>0?freteProduto/p.qtd:0

let imposto=p.venda*taxa

let custo=unit+freteUnit+imposto

let lucro=p.venda-custo

let margem=p.venda>0?(lucro/p.venda)*100:0

vendaTotal+=p.venda*p.qtd
lucroTotal+=lucro*p.qtd


document.getElementById('i'+p.i).innerText='R$ '+imposto.toFixed(2)

document.getElementById('c'+p.i).innerText='R$ '+custo.toFixed(2)

document.getElementById('l'+p.i).innerText='R$ '+lucro.toFixed(2)

document.getElementById('m'+p.i).innerText=margem.toFixed(1)+'%'

}


document.getElementById('totalProdutos').innerText=count

document.getElementById('custoTotal').innerText='R$ '+totalCompra.toFixed(2)

document.getElementById('vendaTotal').innerText='R$ '+vendaTotal.toFixed(2)

document.getElementById('lucroTotal').innerText='R$ '+lucroTotal.toFixed(2)

}

function exportExcel(){

let tabela=document.querySelector('table').outerHTML

let url='data:application/vnd.ms-excel,'+encodeURIComponent(tabela)

let a=document.createElement('a')

a.href=url

a.download='custos_supportti.xls'

a.click()

}

addProduto()

</script>

</body>
</html>
